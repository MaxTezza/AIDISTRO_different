# Calamares module configurations — AI Distro

welcome:
  showSupportUrl: false
  showKnownIssuesUrl: false
  showReleaseNotesUrl: false
  requirements:
    requiredStorage: 10
    requiredRam: 2.0
    internetCheckUrl: https://gitlab.com
    check:
      - storage
      - ram
      - root

locale:
  region: "NorthAmerica"
  zone: "New_York"
  GeoIP:
    style: "json"
    url: "https://ipapi.co/json"

keyboard:
  style: "keyboard"

partition:
  efiSystemPartition: "/boot/efi"
  efiSystemPartitionSize: 512M
  defaultFileSystemType: "ext4"
  availableFileSystemTypes: ["ext4", "btrfs", "xfs"]
  allowManualPartitioning: true
  alwaysShowPartitionLabels: true
  initialPartitioningChoice: erase
  initialSwapChoice: small
  drawNestedPartitions: false

users:
  defaultGroups:
    - name: wheel
      must_exist: false
    - name: audio
      must_exist: false
    - name: video
      must_exist: false
    - name: network
      must_exist: false
    - name: input
      must_exist: false
  autologinGroup: autologin
  doAutologin: true
  setRootPassword: false
  doReusePassword: true
  passwordRequirements:
    minLength: 6

displaymanager:
  displaymanagers:
    - greetd

unpackfs:
  - source: /cdrom/casper/rootfs.squashfs
    sourcefs: squashfs
    destination: ""

services-systemd:
  services:
    - name: "NetworkManager"
      mandatory: false
    - name: "ai-distro-agent"
      mandatory: false
    - name: "ai-distro-voice"
      mandatory: false
    - name: "ai-distro-curator"
      mandatory: false
    - name: "ai-distro-healer"
      mandatory: false
    - name: "ai-distro-eventbus"
      mandatory: false
    - name: "ai-distro-wakeword"
      mandatory: false
    - name: "ai-distro-dashboard"
      mandatory: false

bootloader:
  installPath: "/boot/grub"
  efiBootloaderId: "ai-distro"

postcfg:
  commands:
    - command: "/usr/bin/ai-distro-postinstall"
      timeout: 120

finished:
  restartNowEnabled: true
  restartNowChecked: true
  restartNowCommand: "systemctl reboot"
