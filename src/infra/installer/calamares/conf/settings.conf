# Calamares global settings — AI Distro
# Fully configured for GUI disk installation

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - luksbootkeyfile
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - grubcfg
      - bootloader
      - postcfg
      - umount
  - show:
      - finished

branding: ai-distro

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false

# Required storage (10 GB minimum)
required-storage-gib: 10

# Required RAM (2 GB minimum)
required-ram-gib: 2
