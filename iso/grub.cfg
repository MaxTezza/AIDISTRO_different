# AI Distro — GRUB Boot Theme
# This gets injected into the live ISO's GRUB config

set default=0
set timeout=5

# Colors
set color_normal=white/black
set color_highlight=cyan/black

# Menu
menuentry "AI Distro — Live Session" {
    linux /live/vmlinuz boot=live components quiet splash
    initrd /live/initrd.img
}

menuentry "AI Distro — Live (Safe Graphics)" {
    linux /live/vmlinuz boot=live components nomodeset quiet splash
    initrd /live/initrd.img
}

menuentry "AI Distro — Live (Debug)" {
    linux /live/vmlinuz boot=live components
    initrd /live/initrd.img
}

menuentry "Memory Test" {
    linux16 /live/memtest
}
