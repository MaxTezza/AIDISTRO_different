stages:
  - test

rust-check:
  stage: test
  image: rust:latest
  script:
    - cd src/rust
    - cargo check

python-lint:
  stage: test
  image: python:latest
  script:
    - pip install ruff
    - ruff check .
    - apt-get update -qy
    - apt-get install -y build-essential ninja-build meson cmake pkg-config libdbus-1-dev libglib2.0-dev libdbus-glib-1-dev libgirepository1.0-dev libgirepository-2.0-dev gobject-introspection libcairo2-dev portaudio19-dev
    - pip install --upgrade pip setuptools wheel
    - pip install -r requirements.txt
