stages:
  - test

rust-check:
  stage: test
  image: rust:latest
  script:
    - cd src/rust
    - cargo check

python-lint:
  stage: test
  image: python:latest
  script:
    - pip install ruff
    - ruff check .
    - apt-get update -qy
    - apt-get install -y build-essential ninja-build libdbus-1-dev libglib2.0-dev pkg-config libgirepository1.0-dev portaudio19-dev
    - pip install -r requirements.txt
