stages:
  - lint
  - build

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

.rust-cache:
  image: rust:1.78-bookworm
  cache:
    key: rust-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/
      - src/rust/target/

lint-rust:
  stage: lint
  extends:
    - .rust-cache
  before_script:
    - rustup component add clippy rustfmt
  script:
    - cd src/rust
    - cargo clippy --all-targets --all-features -- -D warnings
    - cargo fmt --check

lint-python:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff -q
    - ruff check .

test-rust:
  stage: lint
  extends:
    - .rust-cache
  allow_failure: true
  script:
    - cd src/rust
    - cargo test --all 2>&1 || true

build-rust:
  stage: build
  extends:
    - .rust-cache
  artifacts:
    paths:
      - src/rust/target/release/ai-distro-agent
      - src/rust/target/release/ai-distro-voice
      - src/rust/target/release/ai-distro-hud
      - src/rust/target/release/ai-distro-cli
    expire_in: 1 week
  script:
    - cd src/rust
    - cargo build --release --all

build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - |
      if [ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]; then
        docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
        docker push $CI_REGISTRY_IMAGE:latest
      fi
