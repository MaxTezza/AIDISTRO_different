stages:
  - lint
  - build
  - release

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUST_VERSION: "latest"

.rust-cache:
  cache:
    key: rust-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/
      - src/rust/target/

.rust-deps:
  before_script:
    - rustup component add clippy rustfmt
    - apt-get update && apt-get install -y libasound2-dev pkg-config libatspi2.0-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev libgbm-dev libdbus-1-dev libfontconfig1-dev libssl-dev xvfb

lint-rust:
  stage: lint
  image: rust:latest
  extends: 
    - .rust-cache
    - .rust-deps
  script:
    - cd src/rust
    - cargo clippy --all-targets --all-features -- -D warnings
    - cargo fmt --check

lint-python:
  stage: lint
  image: python:3.11
  before_script:
    - apt-get update && apt-get install -y libdbus-1-dev libgirepository1.0-dev libgirepository-2.0-dev gobject-introspection libcairo2-dev portaudio19-dev pkg-config meson ninja-build
  script:
    - pip install ruff
    - ruff check .
    - pip install --upgrade pip setuptools wheel meson-python meson ninja
    - pip install pycairo
    - pip install -r requirements.txt

test-rust:
  stage: lint
  image: rust:latest
  extends: 
    - .rust-cache
    - .rust-deps
  allow_failure: true
  script:
    - cd src/rust
    - xvfb-run cargo test --all

build-rust:
  stage: build
  image: rust:latest
  extends: 
    - .rust-cache
    - .rust-deps
  artifacts:
    paths:
      - src/rust/target/release/ai-distro-agent
      - src/rust/target/release/ai-distro-voice
      - src/rust/target/release/ai-distro-hud
      - src/rust/target/release/ai-distro-cli
    expire_in: 1 week
  script:
    - cd src/rust
    - xvfb-run cargo build --release --all

build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - |
      if [ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]; then
        docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
        docker push $CI_REGISTRY_IMAGE:latest
      fi
